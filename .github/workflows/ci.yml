name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install WinDivert
        shell: pwsh
        run: ./scripts/setup-windivert.ps1
      - run: cargo test --workspace
      - run: cargo build --release -p discdpi-cli
